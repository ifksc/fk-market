<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Вход — FK.market</title>
<link rel="icon" type="image/svg+xml" href="assets/logo-a.svg">
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={darkMode:'class',theme:{extend:{colors:{brand:{50:'#eef2ff',500:'#6366f1',600:'#4f46e5',700:'#4338ca'},accent:{500:'#10b981'}}}}}</script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/app.css">
<script src="assets/theme.js"></script>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-slate-950 dark:text-slate-100 antialiased min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-md">
  <a href="index.html" class="flex items-center gap-2 justify-center mb-8">
    <img src="assets/logo-a.svg" class="w-10 h-10" alt="">
    <span class="fk-logo text-2xl">FK.market</span>
  </a>

  <div class="bg-white dark:bg-slate-900 border border-gray-200 dark:border-slate-800 rounded-2xl p-8 shadow-xl">
    <div class="flex gap-1 p-1 rounded-xl bg-gray-100 dark:bg-slate-800 mb-6 text-sm">
      <button class="flex-1 h-9 rounded-lg bg-white dark:bg-slate-900 font-medium shadow-sm">Вход</button>
      <button class="flex-1 h-9 rounded-lg text-gray-500">Регистрация</button>
    </div>

    <h1 class="text-2xl font-bold mb-1">С возвращением</h1>
    <p class="text-sm text-gray-500 mb-6">Войдите, чтобы видеть свои заказы и баланс</p>

    <div class="grid grid-cols-3 gap-2 mb-5">
      <!-- VK -->
      <button class="h-11 rounded-xl text-white font-medium flex items-center justify-center gap-2" style="background:#0077FF">
        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor"><path d="M13.2 17.3c-5.4 0-8.5-3.7-8.6-9.9h2.7c.1 4.5 2.1 6.4 3.7 6.8V7.4h2.5v3.9c1.6-.2 3.2-2 3.8-3.9h2.5c-.4 2.3-2.2 4.1-3.4 4.8 1.2.6 3.3 2.2 4.1 5.1h-2.8c-.6-2-2.1-3.5-4.2-3.7v3.7h-.3z"/></svg>
        VK
      </button>
      <!-- Yandex -->
      <button class="h-11 rounded-xl text-white font-medium flex items-center justify-center gap-2" style="background:#FC3F1D">
        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor"><path d="M14.6 4h-2.3C8.6 4 6.8 6.2 6.8 9.1c0 1.9.9 3.3 2.5 4.2L6 20h2.4l3.5-7.2v7.2h2V4.2h-2c-.3 0-.7-.2-.7-.2m0 6.8h-1.3c-1.6 0-2.4-1.1-2.4-2.7 0-1.7 1-2.5 2.4-2.5h1.3v5.2z"/></svg>
        Я
      </button>
      <!-- Telegram -->
      <button class="h-11 rounded-xl text-white font-medium flex items-center justify-center gap-2" style="background:#0088CC">
        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor"><path d="m22 3-5 18-6.5-6 9.5-9L7 14 2 12l20-9z"/></svg>
        TG
      </button>
    </div>

    <div class="flex items-center gap-3 my-5 text-xs text-gray-400">
      <div class="flex-1 h-px bg-gray-200 dark:bg-slate-800"></div>
      или email
      <div class="flex-1 h-px bg-gray-200 dark:bg-slate-800"></div>
    </div>

    <form class="space-y-3">
      <div>
        <label class="text-xs text-gray-500 mb-1 block">Email</label>
        <input type="email" placeholder="you@example.com" class="w-full h-11 px-3 rounded-xl border border-gray-200 dark:border-slate-800 bg-white dark:bg-slate-900">
      </div>
      <div>
        <label class="text-xs text-gray-500 mb-1 block flex justify-between"><span>Пароль</span><a href="#" class="text-brand-600 hover:underline">Забыли?</a></label>
        <input type="password" placeholder="••••••••" class="w-full h-11 px-3 rounded-xl border border-gray-200 dark:border-slate-800 bg-white dark:bg-slate-900">
      </div>
      <label class="flex items-center gap-2 text-sm text-gray-500"><input type="checkbox" class="accent-brand-500" checked> Запомнить меня</label>
      <button type="button" class="w-full h-12 rounded-xl fk-grad-btn text-white font-semibold">Войти</button>
    </form>

    <p class="text-xs text-gray-500 text-center mt-6">Нет аккаунта? <a href="#" class="text-brand-600 hover:underline">Зарегистрироваться</a></p>
  </div>

  <p class="text-xs text-gray-400 text-center mt-6">
    Нажимая «Войти», вы принимаете <a href="#" class="text-brand-600 hover:underline">оферту</a> и <a href="#" class="text-brand-600 hover:underline">политику конфиденциальности</a>
  </p>

  <div class="text-center mt-6">
    <button data-theme-toggle class="text-xs text-gray-400 hover:text-brand-600">Сменить тему</button>
  </div>
</div>

</body></html>
