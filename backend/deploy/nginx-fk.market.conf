# FK.market — nginx reverse proxy (origin за DDoS-Guard)
# Положить в: /etc/nginx/sites-available/fk.market
# Включить:   ln -s /etc/nginx/sites-available/fk.market /etc/nginx/sites-enabled/
#
# ВНИМАНИЕ: это эталонный ШАБЛОН. Перед применением сверить с боевым конфигом
# на сервере (SSL-секции, точные порты). Домен за DDoS-Guard:
#   посетитель → DDoS-Guard (edge SSL) → origin :443 → этот nginx → docker.
#
# Маршрутизация — path-based на одном домене fk.market:
#   /api/      и  /storage/   → backend (Laravel в docker, :8000)
#   /_next/static/  и  всё остальное → frontend (Next.js в docker, :3000)

server {
    listen 80;
    server_name fk.market www.fk.market;

    client_max_body_size 32M;
    gzip on;
    gzip_types text/plain application/json application/javascript text/css image/svg+xml;

    # --- Реальный IP клиента от DDoS-Guard --------------------------------
    # DDoS-Guard передаёт реальный IP в заголовке DDG-Connecting-IP.
    # Раскомментировать и подставить АКТУАЛЬНЫЕ CIDR-сети DDoS-Guard
    # (взять в панели/поддержке DDoS-Guard) — по одной строке set_real_ip_from
    # на каждую сеть. БЕЗ списка доверенных сетей real_ip_header не трогать:
    # иначе nginx поверит заголовку DDG-Connecting-IP от кого угодно (спуфинг IP).
    #
    # set_real_ip_from 1.2.3.0/24;
    # set_real_ip_from 5.6.7.0/24;
    # real_ip_header   DDG-Connecting-IP;

    # --- API (Laravel) ----------------------------------------------------
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Вебхуки Freekassa — таймаут побольше (выдача может занять время).
    # Более длинный префикс приоритетнее /api/ — этот блок выиграет для платежей.
    location /api/payments/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # --- Загруженные файлы (картинки товаров и категорий) -----------------
    location /storage/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_cache_valid 200 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # --- Статика Next.js — кэшируется агрессивно --------------------------
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # --- Frontend (Next.js) — всё остальное -------------------------------
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
