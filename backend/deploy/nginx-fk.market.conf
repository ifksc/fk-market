# FK.market — nginx reverse proxy
# Положить в: /etc/nginx/sites-available/fk.market
# Включить:   ln -s /etc/nginx/sites-available/fk.market /etc/nginx/sites-enabled/
# После certbot --nginx -d fk.market этот файл будет автоматически дополнен SSL-секциями.

# --- API (Laravel на :8000 в docker) -----------------------------------
server {
    listen 80;
    server_name api.fk.market;

    client_max_body_size 32M;
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Вебхуки FKwallet — без кэша, чуть больше таймаут
    location ~ ^/api/payments/webhook/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }
}

# --- Frontend (Next.js на :3000 в docker) ------------------------------
server {
    listen 80;
    server_name fk.market www.fk.market;

    client_max_body_size 32M;
    gzip on;
    gzip_types text/plain application/javascript text/css image/svg+xml;

    # Статика Next.js кэшируется агрессивно
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
